<svg width="100%" viewBox="0 0 680 680" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Rentout chatbot</title>
<desc>Friendly robot sitting in a blue armchair with a laptop, plant, and coffee mug</desc>
<defs>
<style>
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes blink{0%,88%,100%{transform:scaleY(1)}92%{transform:scaleY(0.08)}}
@keyframes type1{0%,100%{opacity:1}33%{opacity:0.2}}
@keyframes type2{0%,33%,100%{opacity:0.2}66%{opacity:1}}
@keyframes type3{0%,66%,100%{opacity:0.2}33%{opacity:0.2}83%{opacity:1}100%{opacity:0.2}}
@keyframes steam{0%{transform:translateY(0) scaleX(1);opacity:0.7}100%{transform:translateY(-14px) scaleX(1.4);opacity:0}}
@keyframes bubble{0%{opacity:0;transform:scale(0.6)}100%{opacity:1;transform:scale(1)}}
@keyframes screenGlow{0%,100%{opacity:0.7}50%{opacity:1}}
.bot-float{animation:float 3s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
.eye-l{animation:blink 3.5s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
.eye-r{animation:blink 3.5s ease-in-out infinite 0.08s;transform-box:fill-box;transform-origin:center}
.dot1{animation:type1 1.2s ease-in-out infinite}
.dot2{animation:type2 1.2s ease-in-out infinite}
.dot3{animation:type3 1.2s ease-in-out infinite}
.steam1{animation:steam 1.8s ease-out infinite}
.steam2{animation:steam 1.8s ease-out infinite 0.6s}
.bubble-in{animation:bubble 0.5s cubic-bezier(0.34,1.56,0.64,1) both}
.screen{animation:screenGlow 2s ease-in-out infinite}
</style>
</defs>
